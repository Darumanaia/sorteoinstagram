<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteo Instagram — Zorionak!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold-dim: #C9A22A;
    --bg: #0D0B1A;
    --bg2: #15122A;
    --bg3: #1E1A38;
    --text: #EDE8FF;
    --muted: #8A82B0;
    --accent: #A855F7;
    --accent2: #EC4899;
    --green: #22D3A5;
    --red: #FF5C7A;
    --border: rgba(168,85,247,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(168,85,247,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(236,72,153,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, var(--gold) 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .logo p {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  /* STEP 1 */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    margin-bottom: 1.25rem;
  }

  .step-label {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .step-num {
    width: 20px; height: 20px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  input[type="text"], textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder, textarea::placeholder {
    color: var(--muted);
  }

  .url-input { flex: 1; min-width: 200px; }

  button {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.875rem;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0.75rem 1.4rem;
    white-space: nowrap;
  }

  button:active { transform: scale(0.97); }

  .btn-extract {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    letter-spacing: 0.03em;
  }

  .btn-extract:hover { opacity: 0.88; }
  .btn-extract:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-add {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  .btn-clear {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(255,92,122,0.3);
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
  }
  .btn-clear:hover { background: rgba(255,92,122,0.08); }

  .btn-spin {
    background: linear-gradient(135deg, var(--gold), #E8A020);
    color: #1a1100;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    padding: 1rem 3rem;
    border-radius: 50px;
    box-shadow: 0 0 30px rgba(245,200,66,0.35);
    display: block;
    margin: 1.5rem auto 0;
    min-width: 220px;
  }
  .btn-spin:hover { box-shadow: 0 0 45px rgba(245,200,66,0.55); }
  .btn-spin:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

  .btn-reset {
    background: var(--bg3);
    color: var(--muted);
    border: 1px solid var(--border);
    margin: 0 auto;
    display: block;
    margin-top: 1rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.25rem 0;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Participants list */
  #participants-count {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }
  #participants-count span {
    color: var(--green);
    font-weight: 700;
  }

  .tags-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    max-height: 180px;
    overflow-y: auto;
    padding-right: 0.25rem;
  }

  .tags-grid::-webkit-scrollbar { width: 4px; }
  .tags-grid::-webkit-scrollbar-track { background: transparent; }
  .tags-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 0.3rem 0.75rem;
    font-size: 0.8rem;
    color: var(--text);
    transition: border-color 0.15s;
  }
  .tag:hover { border-color: var(--accent); }
  .tag-remove {
    cursor: pointer;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1;
    background: none;
    border: none;
    padding: 0;
    color: var(--muted);
    transition: color 0.15s;
    font-weight: 400;
    min-width: auto;
  }
  .tag-remove:hover { color: var(--red); transform: none; }

  /* Status messages */
  .status {
    font-size: 0.8rem;
    padding: 0.6rem 1rem;
    border-radius: 10px;
    margin-top: 0.75rem;
    display: none;
  }
  .status.info { background: rgba(168,85,247,0.1); color: var(--accent); border: 1px solid rgba(168,85,247,0.2); display: block; }
  .status.success { background: rgba(34,211,165,0.1); color: var(--green); border: 1px solid rgba(34,211,165,0.2); display: block; }
  .status.error { background: rgba(255,92,122,0.1); color: var(--red); border: 1px solid rgba(255,92,122,0.2); display: block; }
  .status.loading { display: flex; align-items: center; gap: 0.5rem; background: rgba(168,85,247,0.1); color: var(--accent); border: 1px solid rgba(168,85,247,0.2); }

  /* Spinner */
  .spin-icon {
    width: 14px; height: 14px;
    border: 2px solid var(--accent);
    border-top-color: transparent;
    border-radius: 50%;
    animation: rotate 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }

  /* WHEEL SECTION */
  #wheel-section {
    display: none;
    text-align: center;
  }

  .wheel-wrapper {
    position: relative;
    display: inline-block;
    margin: 1rem auto;
  }

  #wheel-canvas {
    border-radius: 50%;
    display: block;
    filter: drop-shadow(0 0 25px rgba(168,85,247,0.4));
  }

  .wheel-pointer {
    position: absolute;
    top: 50%;
    right: -18px;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-right: 28px solid var(--gold);
    filter: drop-shadow(0 0 8px rgba(245,200,66,0.6));
  }

  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 44px; height: 44px;
    background: var(--bg);
    border: 3px solid var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 16px rgba(245,200,66,0.5);
  }

  /* WINNER */
  #winner-section {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
  }

  #winner-section .zorionak {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--gold) 0%, var(--accent2) 60%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse-glow 1.5s ease-in-out infinite alternate;
    line-height: 1;
  }

  @keyframes pulse-glow {
    from { filter: brightness(1); }
    to { filter: brightness(1.3); }
  }

  .winner-card {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 2px solid var(--gold);
    border-radius: 24px;
    padding: 2rem 2.5rem;
    display: inline-block;
    margin: 1.5rem auto;
    box-shadow: 0 0 50px rgba(245,200,66,0.2), 0 0 100px rgba(168,85,247,0.15);
    animation: winner-appear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  @keyframes winner-appear {
    from { opacity: 0; transform: scale(0.6); }
    to { opacity: 1; transform: scale(1); }
  }

  .winner-card .ig-handle {
    font-size: clamp(1.4rem, 5vw, 2.5rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .winner-card .ig-handle::before {
    content: '@';
    color: var(--accent);
    font-size: 0.7em;
  }

  .winner-card .trophy {
    font-size: 3rem;
    margin-bottom: 0.5rem;
    display: block;
  }

  .confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .input-row { flex-direction: column; }
    #wheel-canvas { width: 280px !important; height: 280px !important; }
  }
</style>
</head>
<body>
<canvas class="confetti-canvas" id="confetti-canvas"></canvas>

<div class="container">
  <div class="logo">
    <h1>Sorteo Instagram</h1>
    <p>Elige al ganador de forma aleatoria</p>
  </div>

  <!-- STEP 1: Extract from URL -->
  <div class="card" id="step1-card">
    <div class="step-label"><span class="step-num">1</span> Extraer comentarios de Instagram</div>
    <div class="input-row">
      <input type="text" class="url-input" id="ig-url" placeholder="https://www.instagram.com/p/XXXXXXXXXX/">
      <button class="btn-extract" id="btn-extract" onclick="extractComments()">
        Extraer comentarios
      </button>
    </div>
    <div id="extract-status"></div>

    <div class="divider">o añade manualmente</div>

    <div class="input-row">
      <input type="text" id="manual-name" placeholder="@nombre_usuario" onkeydown="if(event.key==='Enter')addManual()">
      <button class="btn-add" onclick="addManual()">+ Añadir</button>
    </div>

    <div style="margin-top:1.25rem;">
      <div id="participants-count"><span id="p-count">0</span> participantes</div>
      <div class="tags-grid" id="tags-grid"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:0.75rem;" id="clear-row" style="display:none">
        <button class="btn-clear" onclick="clearAll()">Borrar todos</button>
      </div>
    </div>

    <button class="btn-spin" id="btn-spin" onclick="startSpin()" disabled>GIRAR LA RULETA</button>
  </div>

  <!-- STEP 2: Wheel -->
  <div id="wheel-section">
    <div class="wheel-wrapper">
      <canvas id="wheel-canvas" width="400" height="400"></canvas>
      <div class="wheel-pointer"></div>
      <div class="wheel-center"></div>
    </div>
  </div>

  <!-- STEP 3: Winner -->
  <div id="winner-section">
    <div class="zorionak">ZORIONAK!</div>
    <div class="winner-card">
      <span class="trophy">🏆</span>
      <div class="ig-handle" id="winner-name">ganador</div>
    </div>
    <button class="btn-reset" onclick="resetApp()">Hacer otro sorteo</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
let participants = [];
let spinning = false;

const COLORS = [
  ['#7C3AED','#DDD6FE'],['#BE185D','#FBCFE8'],['#0E7490','#A5F3FC'],
  ['#B45309','#FDE68A'],['#15803D','#BBF7D0'],['#1E40AF','#BFDBFE'],
  ['#7E22CE','#E9D5FF'],['#9D174D','#FECDD3'],['#0F766E','#99F6E4'],
  ['#B45309','#FEF3C7'],['#166534','#D1FAE5'],['#1D4ED8','#DBEAFE'],
];

function setStatus(el, type, msg) {
  el.className = 'status ' + type;
  el.innerHTML = type === 'loading'
    ? `<span class="spin-icon"></span>${msg}`
    : msg;
}

async function extractComments() {
  const url = document.getElementById('ig-url').value.trim();
  if (!url || !url.includes('instagram.com')) {
    const s = document.getElementById('extract-status');
    setStatus(s, 'error', '⚠️ Introduce una URL válida de Instagram.');
    return;
  }

  const btn = document.getElementById('btn-extract');
  const statusEl = document.getElementById('extract-status');
  btn.disabled = true;
  setStatus(statusEl, 'loading', 'Consultando la IA para extraer comentarios...');

  try {
    // ⚠️ Cambia esta URL por la de tu proxy en Vercel tras el despliegue
  const PROXY_URL = 'https://TU-PROYECTO.vercel.app/api/proxy';

  const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `You are a helper that extracts Instagram usernames from post comments. 
When given an Instagram URL, use web search to find the post and extract all @username handles that have commented.
Respond ONLY with a JSON array of usernames (without the @ symbol), like: ["user1","user2","user3"]
If you cannot find any usernames, return an empty array: []
Do not include any explanation, only the JSON array.`,
        messages: [{
          role: 'user',
          content: `Extract all commenter usernames from this Instagram post: ${url}\n\nReturn ONLY a JSON array of usernames.`
        }]
      })
    });

    const data = await response.json();
    const fullText = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');

    const match = fullText.match(/\[[\s\S]*?\]/);
    if (match) {
      const usernames = JSON.parse(match[0]);
      if (usernames.length > 0) {
        usernames.forEach(u => addParticipant(u.replace('@','')));
        setStatus(statusEl, 'success', `✓ Se encontraron <strong>${usernames.length}</strong> comentaristas.`);
      } else {
        setStatus(statusEl, 'error', '⚠️ Instagram requiere inicio de sesión para ver comentarios. Añade los participantes manualmente.');
      }
    } else {
      setStatus(statusEl, 'error', '⚠️ No se pudieron extraer comentarios automáticamente. Instagram protege su contenido. Añade los participantes manualmente.');
    }
  } catch(e) {
    setStatus(statusEl, 'error', '⚠️ Error de conexión. Añade los participantes manualmente.');
  }

  btn.disabled = false;
}

function addManual() {
  const input = document.getElementById('manual-name');
  const name = input.value.trim().replace('@','');
  if (!name) return;
  addParticipant(name);
  input.value = '';
  input.focus();
}

function addParticipant(name) {
  if (!name || participants.includes(name)) return;
  participants.push(name);
  renderTags();
  updateSpinBtn();
}

function removeParticipant(name) {
  participants = participants.filter(p => p !== name);
  renderTags();
  updateSpinBtn();
}

function renderTags() {
  const grid = document.getElementById('tags-grid');
  const count = document.getElementById('p-count');
  count.textContent = participants.length;
  grid.innerHTML = participants.map(p => `
    <span class="tag">@${p}<button class="tag-remove" onclick="removeParticipant('${p.replace(/'/g,"\\'")}')">×</button></span>
  `).join('');
  document.getElementById('clear-row').style.display = participants.length ? 'flex' : 'none';
}

function clearAll() {
  participants = [];
  renderTags();
  updateSpinBtn();
}

function updateSpinBtn() {
  document.getElementById('btn-spin').disabled = participants.length < 2;
}

/* ── WHEEL ── */
let wheelAngle = 0;
let animId;

function startSpin() {
  if (spinning || participants.length < 2) return;
  spinning = true;

  document.getElementById('step1-card').style.display = 'none';
  const ws = document.getElementById('wheel-section');
  ws.style.display = 'block';

  const canvas = document.getElementById('wheel-canvas');
  const size = Math.min(window.innerWidth - 80, 420);
  canvas.width = canvas.height = size;

  const winnerIdx = Math.floor(Math.random() * participants.length);
  const segAngle = (2 * Math.PI) / participants.length;
  // pointer is on the right side; we want winnerIdx segment to end up there
  // pointer at angle 0 (right). Segment center: winnerIdx * segAngle + segAngle/2
  // We want that center = 0 (pointing right = angle 0)
  const targetAngle = -(winnerIdx * segAngle + segAngle / 2);

  const totalSpins = 8 + Math.random() * 2; // ~8-10 seconds at 1 spin/sec
  const totalRotation = totalSpins * 2 * Math.PI + targetAngle - (wheelAngle % (2 * Math.PI));
  const duration = 8000;
  const startTime = performance.now();
  const startAngle = wheelAngle;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function draw(angle) {
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const n = participants.length;
    const seg = (2 * Math.PI) / n;

    for (let i = 0; i < n; i++) {
      const startA = angle + i * seg;
      const endA = startA + seg;
      const [fill, textCol] = COLORS[i % COLORS.length];

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startA, endA);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Label
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(startA + seg / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = textCol;
      const fontSize = Math.max(9, Math.min(14, r * 0.085));
      ctx.font = `600 ${fontSize}px 'DM Sans', sans-serif`;
      const label = '@' + (participants[i].length > 12 ? participants[i].slice(0,11)+'…' : participants[i]);
      ctx.fillText(label, r - 10, fontSize * 0.38);
      ctx.restore();
    }

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(245,200,66,0.6)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    wheelAngle = startAngle + totalRotation * easeOut(t);
    draw(wheelAngle);

    if (t < 1) {
      animId = requestAnimationFrame(animate);
    } else {
      wheelAngle = startAngle + totalRotation;
      draw(wheelAngle);
      showWinner(participants[winnerIdx]);
    }
  }

  draw(wheelAngle);
  animId = requestAnimationFrame(animate);
}

function showWinner(name) {
  setTimeout(() => {
    document.getElementById('wheel-section').style.display = 'none';
    const ws = document.getElementById('winner-section');
    ws.style.display = 'block';
    document.getElementById('winner-name').textContent = name;
    launchConfetti();
    spinning = false;
  }, 800);
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const myConfetti = confetti.create(canvas, { resize: true });
  const colors = ['#F5C842','#A855F7','#EC4899','#22D3A5','#ffffff'];

  function fire(opts) {
    myConfetti(Object.assign({
      particleCount: 80,
      spread: 80,
      colors,
      zIndex: 999,
    }, opts));
  }

  fire({ origin: { x: 0.3, y: 0.6 }, angle: 60 });
  fire({ origin: { x: 0.7, y: 0.6 }, angle: 120 });

  setTimeout(() => {
    fire({ origin: { x: 0.5, y: 0.4 }, angle: 90, particleCount: 150, spread: 120 });
  }, 300);

  setTimeout(() => {
    fire({ origin: { x: 0.2, y: 0.5 }, angle: 75 });
    fire({ origin: { x: 0.8, y: 0.5 }, angle: 105 });
  }, 700);
}

function resetApp() {
  participants = [];
  spinning = false;
  wheelAngle = 0;
  document.getElementById('winner-section').style.display = 'none';
  document.getElementById('wheel-section').style.display = 'none';
  document.getElementById('step1-card').style.display = 'block';
  document.getElementById('ig-url').value = '';
  document.getElementById('extract-status').className = 'status';
  renderTags();
  updateSpinBtn();
  if (animId) cancelAnimationFrame(animId);
}
</script>
</body>
</html>
